eras_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      user: user
      # Do not store password here.
      # Configure your password in the git-ignored .user.yml file,
      # or pass it at runtime: DBT_ENV_SECRET_PASSWORD=... dbt build --profiles-dir .
      password: "{{ env_var('DBT_ENV_SECRET_PASSWORD', '') }}"
      port: 5434
      dbname: erg_opera_data
      schema: analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      retries: 1
      application_name: dbt
      search_path: analytics
      role: null
      sslmode: disable
