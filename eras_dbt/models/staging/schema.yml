version: 2

models:
  - name: stg_cashiering_postings
    description: "Revenue-type financial postings from OPERA Cloud, filtered and categorised. Excludes 9xxx Wrapper rows."
    columns:
      - name: transaction_no
        description: "OPERA transaction number — primary identifier for a posting row."
        tests:
          - unique
          - not_null
      - name: revenue_category
        description: "Derived category from transaction_code prefix: Room / FnB / Tax / ServiceCharge / Other."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Room', 'FnB', 'Tax', 'ServiceCharge', 'Other']
      - name: reservation_id
        description: "OPERA reservation ID (guestInfo.reservationId.id). Nullable — unmatched postings have NULL."
      - name: hotel_id
        description: "OPERA hotel/property code."
      - name: revenue_date
        description: "Date of the posting (revenueDate from OPERA)."
      - name: transaction_code
        description: "OPERA transaction code (TEXT). Revenue-type only; 9xxx excluded."
      - name: posted_amount
        description: "Posted amount (numeric)."
      - name: cashier_id
        description: "Cashier ID (raw_data.cashierId). Pass-through provenance column."
      - name: reference
        description: "Reference string (raw_data.reference). Pass-through provenance column."

  - name: stg_transaction_codes
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - hotel_id
            - transaction_code
    columns:
      - name: transaction_code
        description: "OPERA transaction code"
        tests:
          - not_null
      - name: hotel_id
        description: "OPERA hotel/property code"
        tests:
          - not_null

  - name: stg_reservations
    columns:
      - name: reservation_id
        tests:
          - unique
          - not_null
      - name: hotel_id
        description: "OPERA hotel/property code (raw_data->>'hotelId'). Conforms dim_property."
      - name: guest_city
        description: "Guest address city (reservationGuest.address.cityName)."
      - name: guest_postal_code
        description: "Guest address postal code (reservationGuest.address.postalCode)."
      - name: guest_state
        description: "Guest address state/region (reservationGuest.address.state)."
      - name: guest_country_code
        description: "Guest address country code (reservationGuest.address.country.code)."
      - name: rate_plan_code
        description: "Rate plan code for the stay (roomStay.ratePlanCode). Feeds dim_rate."
      - name: market_code
        description: "Market segment code (roomStay.marketCode). Feeds dim_rate."
      - name: source_of_business
        description: "Source of business (roomStay.sourceOfBusiness). Feeds dim_rate."
