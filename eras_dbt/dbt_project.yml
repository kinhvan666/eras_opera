name: 'eras_dbt'
version: '1.0.0'
config-version: 2
profile: 'eras_dbt'
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

models:
  eras_dbt:
    staging:
      +materialized: view
    dimensional:
      +materialized: table
    marts:
      +materialized: table

vars:
  room_count_default: 250  # fallback when enterprise_hotel_config not yet extracted for a hotel_id
