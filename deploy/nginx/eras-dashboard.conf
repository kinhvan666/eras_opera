# /etc/nginx/sites-available/eras-dashboard
# Nginx reverse proxy cho Eras Opera Dashboard
#
# Cài đặt trên server:
#   sudo cp deploy/nginx/eras-dashboard.conf /etc/nginx/sites-available/eras-dashboard
#   sudo ln -s /etc/nginx/sites-available/eras-dashboard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # Thay bằng domain hoặc IP public thực tế

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://127.0.0.1:8501;

        # WebSocket support — Streamlit cần thiết
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout dài cho Streamlit long-polling
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
